version: '3.8'

services:
  award-search:
    build: .
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - DISPLAY=:99
    ports:
      - "6080:6080"   # noVNC web interface
      - "5900:5900"   # VNC
    volumes:
      - ./config:/home/appuser/award-search/config:ro
      - ./output:/home/appuser/award-search/output
      - ./credentials:/home/appuser/award-search/credentials:ro
    shm_size: '2gb'
    restart: unless-stopped